<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CBCT Tooth Segmentation Viewer</title>
  <script src="https://niivue.github.io/niivue/dist/niivue.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #ffffff; font-family: "Segoe UI", sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
    #header h1 { font-size: 16px; font-weight: 600; color: #4fc3f7; }
    #controls { display: flex; gap: 10px; align-items: center; }
    button { background: #2a2a2a; color: #ffffff; border: 1px solid #444; padding: 7px 16px; cursor: pointer; border-radius: 6px; font-size: 13px; transition: all 0.2s; }
    button:hover { background: #3a3a3a; border-color: #4fc3f7; }
    button.active { background: #1565c0; border-color: #4fc3f7; }
    #opacity-wrapper { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aaa; }
    input[type=range] { width: 90px; accent-color: #4fc3f7; }
    #canvas-wrapper { flex: 1; position: relative; }
    canvas { width: 100%; height: 100%; display: block; }
    #status { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px; font-size: 12px; color: #aaa; pointer-events: none; }
  </style>
</head>
<body>
  <div id="header">
    <h1>CBCT Tooth Segmentation Viewer</h1>
    <div id="controls">
      <button id="btn-seg" class="active" onclick="toggleSeg()">Segmentation: ON</button>
      <button onclick="toggleView()">Toggle 3D</button>
      <button onclick="resetView()">Reset View</button>
      <div id="opacity-wrapper">
        Opacity:
        <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.7" oninput="setOpacity(this.value)">
      </div>
    </div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="gl"></canvas>
    <div id="status">Scroll to navigate slices | Click + drag to rotate in 3D</div>
  </div>
  <script>
    const nv = new niivue.Niivue({ show3Dcrosshair: true, backColor: [0.07, 0.07, 0.07, 1] });
    nv.attachToCanvas(document.getElementById("gl"));
    async function loadVolumes() {
      await nv.loadVolumes([
        { url: "scan.nii.gz", colormap: "gray", opacity: 1.0 },
        { url: "mask.nii.gz", colormap: "warm", opacity: 0.7 }
      ]);
    }
    loadVolumes();
    let segVisible = true;
    function toggleSeg() {
      segVisible = !segVisible;
      nv.setOpacity(1, segVisible ? 0.7 : 0);
      const btn = document.getElementById("btn-seg");
      btn.textContent = segVisible ? "Segmentation: ON" : "Segmentation: OFF";
      btn.classList.toggle("active", segVisible);
    }
    function toggleView() {
      nv.setSliceType(nv.opts.sliceType !== 4 ? nv.sliceTypeRender : nv.sliceTypeMultiplanar);
    }
    function resetView() {
      nv.setSliceType(nv.sliceTypeMultiplanar);
      nv.setOpacity(1, 0.7);
      document.getElementById("opacity").value = 0.7;
      segVisible = true;
      document.getElementById("btn-seg").textContent = "Segmentation: ON";
      document.getElementById("btn-seg").classList.add("active");
    }
    function setOpacity(val) { if (segVisible) nv.setOpacity(1, parseFloat(val)); }
  </script>
</body>
</html>
